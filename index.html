const HIDDEN_BONUS = {
    name: "情绪钝感力",
    desc: "不易受干扰，自我恢复能力强",

};

// ==================== 10道爆款题库 ====================
const QUESTIONS = [
    { q: "别人对你的评价，你会反复琢磨很久吗？", opt: ["完全会","偶尔会","基本不会","完全不在意"], sbti: [4,3,2,1], effect: [{key:"spotlight",w:2},{key:"sensitive",w:1}] },
    { q: "越想忘记一件小事，脑子里越挥之不去？", opt: ["经常这样","偶尔","很少","不会"], sbti: [4,3,2,1], effect: [{key:"whitebear",w:2},{key:"ruminate",w:1}] },

];

let currentIdx = 0;
let sbtiScore = 0;
let effectScores = {};
let inviteId = localStorage.getItem('inviteId') || ('inv_' + Date.now() + '_' + Math.random().toString(36).substr(2,6));
localStorage.setItem('inviteId', inviteId);
let isPaid = false;
let extraUnlocked = false;

Object.keys(EFFECT_LIB).forEach(k => effectScores[k] = 0);

// ==================== 核心函数 ====================
function startTest() {
    currentIdx = 0;
    sbtiScore = 0;
    Object.keys(effectScores).forEach(k => effectScores[k] = 0);
    renderQuestion();
    switchPage("test");
}

function renderQuestion() {
    const q = QUESTIONS[currentIdx];
    const questionEl = document.getElementById("questionText");
    const container = document.getElementById("optionsContainer");
    if(!questionEl || !container) return;

    questionEl.innerText = q.q;
    container.innerHTML = "";
    q.opt.forEach((opt, idx) => {
        const div = document.createElement("div");
        div.className = "option";
        div.innerText = opt;
        div.onclick = () => selectOption(idx);
        container.appendChild(div);
    });
    const progress = ((currentIdx + 1) / QUESTIONS.length) * 100;
    document.getElementById("progressFill").style.width = progress + "%";
}

function selectOption(optIndex) {
    const q = QUESTIONS[currentIdx];
    sbtiScore += q.sbti[optIndex];
    q.effect.forEach(e => {
        if (EFFECT_LIB[e.key]?.type === "main") effectScores[e.key] += e.w;
    });
    currentIdx++;
    currentIdx < QUESTIONS.length ? renderQuestion() : generateResult();
}

function fillHiddenScores() {
    const mainKeys = Object.keys(EFFECT_LIB).filter(k => EFFECT_LIB[k].type === "main");
    const total = mainKeys.reduce((sum, k) => sum + effectScores[k], 0);
    const avg = mainKeys.length ? total / mainKeys.length : 8;
    Object.keys(EFFECT_LIB).forEach(k => {
        if (EFFECT_LIB[k].type === "hidden") {
            effectScores[k] = effectScores[k] || Math.floor(avg * 0.8) + 1;
        }
    });
}

function safeDecode(base64) {
    try { return atob(base64); } catch(e) { return "暂无详细解析，请稍后重试。"; }
}

function generateResult() {

        personality = "🐒 内耗型吗喽";
        desc = "表面平静，内心早已上演了八百集连续剧，主打一个精神内耗。";
    } else if (sbtiScore <= 25) {
        personality = "⚖️ 矛盾摆烂人";
        desc = "一边想躺平摆烂，一边又忍不住焦虑内卷，反复横跳。";
    } else if (sbtiScore <= 35) {
        personality = "🌿 松弛自愈者";
        desc = "情绪稳定，心态平和，能快速自我调节，朋友眼中的治愈系大神。";
    } else {
        personality = "👁️ 人间清醒者";
        desc = "看透一切，活得通透，不被世俗眼光束缚，只做真实的自己。";
    }
    document.getElementById("personalityTag").innerText = personality;
    document.getElementById("personalityDesc").innerText = desc;

    // 维度展示
    const dims = [
        { name: "内耗指数", score: Math.min(100, (effectScores.internal||0)*10 + (effectScores.ruminate||0)*5) },
        { name: "社交回避", score: Math.min(100, (effectScores.avoid||0)*15 + (effectScores.spotlight||0)*5) },
        { name: "讨好倾向", score: Math.min(100, (effectScores.peoplepleaser||0)*20) },
        { name: "反刍倾向", score: Math.min(100, (effectScores.ruminate||0)*15 + (effectScores.whitebear||0)*5) }
    ];

    dims.forEach(d => {
        dimHtml += `<div class="dimension-item">
            <div class="dimension-label"><span>${d.name}</span><span>${d.score}%</span></div>

    });
    document.getElementById("dimensionSection").innerHTML = dimHtml;

    // 免费结果：只展示常驻效应的TOP1，其余4个常驻锁定（隐藏效应完全不显示）
    const mainSorted = Object.entries(effectScores)
        .filter(([k]) => EFFECT_LIB[k]?.type === "main")
        .sort((a,b)=>b[1]-a[1]);
    
    const top = mainSorted[0];
    const topData = EFFECT_LIB[top[0]];
    const decoded = safeDecode(topData.full);
    const improvement = decoded.split('【改善】')[1]?.split('\n')[0] || "接纳自己，慢慢调整";
    document.getElementById("effectFree").innerHTML = `
        <div class="effect-free">
            <div class="effect-name">${topData.name}</div>
            <div class="effect-desc">${topData.short}<br>✨ 今日改善：${improvement}</div>
        </div>`;

    const lockedDiv = document.getElementById("effectLocked");
    lockedDiv.innerHTML = "";
    for (let i=1; i<Math.min(5, mainSorted.length); i++) {
        const [key, score] = mainSorted[i];
        const data = EFFECT_LIB[key];
        lockedDiv.innerHTML += `
            <div class="effect-locked">
                <div class="blur">
                    <div class="effect-name">${data.name}</div>
                    <div class="effect-desc">${data.short} —— 解锁查看完整成因+改善步骤</div>
                </div>
                <div class="lock-overlay">🔒</div>
            </div>`;
    }

    checkUnlock();
    switchPage("result");
}

function showFullContent() {
    fillHiddenScores();
    const allEffects = Object.entries(effectScores)
        .filter(([k]) => EFFECT_LIB[k])
        .sort((a,b)=>b[1]-a[1]);
    let effectsHtml = "";
    allEffects.forEach(([key, score]) => {
        const data = EFFECT_LIB[key];
        const fullText = safeDecode(data.full);
        effectsHtml += `
            <div class="effect-free">
                <div class="effect-name">${data.name} (强度 ${score})</div>
                <div class="effect-desc">${fullText.replace(/\n/g,'<br>')}</div>
            </div>`;
    });
    if (extraUnlocked) {
        effectsHtml += `
            <div class="effect-free" style="border-left-color:#f97316;">
                <div class="effect-name">🎁 隐藏福利：${HIDDEN_BONUS.name}</div>
                <div class="effect-desc">${HIDDEN_BONUS.content.replace(/\n/g,'<br>')}</div>
            </div>`;
    }
    document.getElementById("effectFree").innerHTML = effectsHtml;
    document.getElementById("effectLocked").innerHTML = "";
    document.getElementById("unlockBtn").style.display = "none";
    document.getElementById("payTip").style.display = "none";
    document.getElementById("benefitsList").style.display = "none";
}

// ==================== 付费 & 解锁 ====================
function goPay() {
    window.open(CONFIG.PAY_URL, '_blank');
    setTimeout(() => {
        if(confirm("支付已完成？点击确定自动解锁")) unlockFull();
    }, 2000);
}

function unlockFull() {
    isPaid = true;
    localStorage.setItem('sbti_paid_expire', Date.now() + CONFIG.EXPIRE_HOURS*3600000);
    showFullContent();
}

function checkUnlock() {
    const urlParams = new URLSearchParams(window.location.search);
    const urlKey = urlParams.get('unlock');
    if(urlKey === CONFIG.UNLOCK_KEY) {
        unlockFull();
        window.history.replaceState({}, document.title, window.location.pathname);
        return;
    }
    const expire = localStorage.getItem('sbti_paid_expire');
    if(expire && Date.now() < parseInt(expire)) {
        isPaid = true;
        showFullContent();
    }
}

// ==================== 分享功能 ====================
function copyInviteLink() {
    const link = window.location.origin + window.location.pathname + "?invite=" + inviteId;
    const toast = document.getElementById("copyToast");
    try {
        navigator.clipboard.writeText(link);
        toast.style.display = "block";
        setTimeout(() => toast.style.display = "none", 1500);
    } catch (e) {
        alert("链接复制成功：" + link);
    }
}

async function generatePoster() {
    const card = document.getElementById("resultCard");
    if(!card) { alert("生成失败，请稍后重试"); return; }
    const cloneCard = card.cloneNode(true);
    cloneCard.style.width = "360px";
    cloneCard.style.padding = "20px";
    cloneCard.style.backgroundColor = "#ffffff";
    if(CONFIG.QR_CODE_URL && CONFIG.QR_CODE_URL !== "https://你的网站二维码图片.png") {
        const qrContainer = document.createElement("div");
        qrContainer.style.textAlign = "center";
        qrContainer.style.marginTop = "16px";
        qrContainer.innerHTML = `<img src="${CONFIG.QR_CODE_URL}" width="100" style="border-radius:12px;">`;
        cloneCard.appendChild(qrContainer);
    }
    document.body.appendChild(cloneCard);
    try {
        const canvas = await html2canvas(cloneCard, {
            useCORS: true,
            scale: 1.5,
            backgroundColor: '#ffffff'
        });
        const link = document.createElement('a');
        link.download = 'SBTI人格测试.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    } catch(e) { alert("生成失败，请直接截图保存"); }
    document.body.removeChild(cloneCard);
}

function fakeShareUnlock() {
    if(extraUnlocked) { alert("🎉 福利已经解锁啦！"); return; }
    extraUnlocked = true;
    localStorage.setItem('sbti_extra_unlocked', 'true');
    alert("🎉 分享成功！已解锁「情绪钝感力」+ 反内耗清单\n\n" + ANTI_LIST);
    if(isPaid) {
        showFullContent();
    } else {
        const extraHtml = `
            <div class="effect-free" style="border-left-color:#f97316;">
                <div class="effect-name">🎁 已解锁福利：${HIDDEN_BONUS.name}</div>
                <div class="effect-desc">${HIDDEN_BONUS.content}</div>
            </div>`;
        document.getElementById("effectFree").innerHTML += extraHtml;
    }
}

function switchPage(id) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    const target = document.getElementById(id);
    if(target) target.classList.add("active");
}

// ==================== 初始化 ====================
window.addEventListener('load', () => {
    extraUnlocked = localStorage.getItem('sbti_extra_unlocked') === 'true';
    checkUnlock();
    const unlockBtn = document.getElementById("unlockBtn");
    if(unlockBtn) unlockBtn.onclick = goPay;
});
</script>
</body>
